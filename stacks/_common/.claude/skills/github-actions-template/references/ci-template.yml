# CI Pipeline Template - Based on scaffolding.tool patterns
# Adapt paths, languages, and deploy steps for your project
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'app/backend/**'
      - uses: actions/setup-python@v6
        if: steps.filter.outputs.backend == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/backend/requirements.txt
      - name: Install and test
        if: steps.filter.outputs.backend == 'true'
        working-directory: app/backend
        run: |
          pip install --upgrade pip
          pip install pytest-cov -r requirements.txt
          pytest --cov=. --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@v7
        if: steps.filter.outputs.backend == 'true'
        with:
          name: backend-coverage
          path: app/backend/coverage.xml
          retention-days: 7
    outputs:
      changed: ${{ steps.filter.outputs.backend }}

  frontend:
    name: Frontend (TypeScript)
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'app/frontend/**'
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.frontend == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      - name: Validate and build
        if: steps.filter.outputs.frontend == 'true'
        working-directory: app/frontend
        run: |
          npm ci
          npm run type-check
          npm run lint
          npm run test:coverage
          npm run build
      - uses: actions/upload-artifact@v7
        if: steps.filter.outputs.frontend == 'true'
        with:
          name: frontend-coverage
          path: app/frontend/coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}

  quality-gate:
    name: SonarQube Analysis
    needs: [backend, frontend]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download backend coverage
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: backend-coverage
          path: app/backend
      - name: Download frontend coverage
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: frontend-coverage
          path: app/frontend/coverage
      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
